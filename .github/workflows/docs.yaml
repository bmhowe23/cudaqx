name: Documentation

on:
  workflow_call:
    inputs:
      deploy_docs:
        type: boolean
        default: false
        required: false
      cache_key_suffix:
        type: string
        default: ''
        required: false
      cudaq_repo:
        type: string
        default: ''
        required: false
      cudaq_ref:
        type: string
        default: ''
        required: false
  workflow_dispatch:
    inputs:
      deploy_docs:
        description: 'Deploy docs to GitHub Pages. Deployment only runs on releases/vX.Y.Z branches.'
        type: boolean
        default: false
        required: false
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docs.yaml'
      - 'docs/**'
      - '**/*.cpp'
      - '**/*.h'
      - '**/*.py'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      container: ${{ steps.set-container.outputs.container }}
    steps:
      - name: Set container image
        id: set-container
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/heads/releases/v(.+)$ ]]; then
            echo "container=ghcr.io/nvidia/cudaqx-dev:${BASH_REMATCH[1]}-amd64-cu12.6" >> $GITHUB_OUTPUT
          else
            echo "container=ghcr.io/nvidia/cudaqx-dev:latest-amd64-cu12.6" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build
    needs: setup
    runs-on: ${{ startsWith(github.repository, 'NVIDIA/cudaqx') && 'linux-amd64-cpu8' || 'ubuntu-latest' }}
    container: ${{ needs.setup.outputs.container }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          set-safe-directory: true

      # ========================================================================
      # CUDA Quantum build
      # ========================================================================

      - name: Get required CUDAQ version
        id: get-cudaq-version
        uses: ./.github/actions/get-cudaq-version
        with:
          repo: ${{ inputs.cudaq_repo }}
          ref: ${{ inputs.cudaq_ref }}

      - name: Get CUDAQ build
        uses: ./.github/actions/get-cudaq-build
        with:
          repo: ${{ steps.get-cudaq-version.outputs.repo }}
          ref: ${{ steps.get-cudaq-version.outputs.ref }}
          token: ${{ secrets.CUDAQ_ACCESS_TOKEN }}
          cache-key-suffix: ${{ inputs.cache_key_suffix }}
          platform: 'amd64-cu12' # Just choose one platform for docs

      # ========================================================================
      # Build docs
      # ========================================================================

      - name: Install requirements
        run: |
          apt update
          apt install -y --no-install-recommends \
            gfortran libblas-dev doxygen

          python3 -m pip install IPython breathe enum_tools myst_parser nbsphinx \
            sphinx_copybutton sphinx_inline_tabs sphinx_gallery sphinx_rtd_theme \
            sphinx_reredirects "sphinx<9" sphinx_toolbox \
            "cuquantum-python-cu12>=26.3.0"

      - name: Build docs
        run: |
          # Note: TRT decoder is disabled because all docs for the TRT decoder
          # are generated independently of the source code (no Doxygen
          # documentation).
          cmake -S . -B "build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-12 \
            -DCMAKE_CXX_COMPILER=g++-12 \
            -DCUDAQ_DIR=/cudaq-install/lib/cmake/cudaq/ \
            -DCUDAQX_ENABLE_LIBS="all" \
            -DCUDAQX_INCLUDE_DOCS=ON \
            -DCUDAQX_BINDINGS_PYTHON=ON \
            -DCUDAQ_QEC_BUILD_TRT_DECODER=OFF

          cmake --build "build" --target docs

      # ========================================================================

      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/build/

  deploy:
    name: Deploy latest docs
    if: |
      github.event_name == 'workflow_dispatch' &&
      inputs.deploy_docs == true &&
      startsWith(github.ref, 'refs/heads/releases/v')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
